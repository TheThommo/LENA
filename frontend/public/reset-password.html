<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — LENA Admin</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0A1628;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: #0F1D33;
  border: 1px solid rgba(27,107,147,0.15);
  border-radius: 16px;
  padding: 48px 40px;
  width: 400px;
  max-width: 90vw;
}
.logo {
  width: 48px; height: 48px; border-radius: 50%;
  background: linear-gradient(135deg, #1B6B93, #145372);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
}
.logo svg { width: 24px; height: 24px; color: white; }
h1 { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.subtitle { text-align: center; color: rgba(255,255,255,0.6); margin-bottom: 28px; font-size: 14px; }
.form-group { margin-bottom: 16px; }
.form-label {
  display: block; font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,0.6); text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 6px;
}
.form-input {
  width: 100%; padding: 10px 14px; background: #152640;
  border: 1px solid rgba(27,107,147,0.15); border-radius: 8px;
  color: #fff; font-family: inherit; font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: #1B6B93; }
.form-input::placeholder { color: rgba(255,255,255,0.3); }
.btn {
  width: 100%; padding: 12px; background: #1B6B93; color: white;
  border: none; border-radius: 8px; font-family: inherit; font-size: 14px;
  font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 8px;
}
.btn:hover { background: #2A8AB5; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error { color: #FF4D4F; font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }
.success { color: #34D399; font-size: 14px; text-align: center; line-height: 1.6; }
.success a { color: #2A8AB5; text-decoration: underline; }
.hint { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 4px; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
    </svg>
  </div>
  <h1>Reset Password</h1>

  <!-- Form state -->
  <div id="formView">
    <p class="subtitle">Enter your new password below.</p>
    <div class="form-group">
      <label class="form-label">New Password</label>
      <input type="password" id="newPassword" class="form-input" placeholder="Enter new password" required autofocus>
      <p class="hint">Minimum 8 characters</p>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm new password" required>
    </div>
    <button class="btn" id="resetBtn" onclick="handleReset()">Set New Password</button>
    <div class="error" id="errorMsg"></div>
  </div>

  <!-- Success state -->
  <div id="successView" style="display:none">
    <p class="success">
      Your password has been reset successfully.<br><br>
      <a href="/admin.html">Return to Admin Console</a>
    </p>
  </div>

  <!-- Expired/invalid state -->
  <div id="expiredView" style="display:none">
    <p class="subtitle" style="color:#FF4D4F">
      This reset link is invalid or has expired.
    </p>
    <p class="subtitle">
      Please request a new one from the <a href="/admin.html" style="color:#2A8AB5">admin login page</a>.
    </p>
  </div>
</div>

<script>
const API_BASE = window.LENA_API_BASE || 'https://lena-production-health.up.railway.app';

function getToken() {
  const params = new URLSearchParams(window.location.search);
  return params.get('token');
}

// If no token in URL, show expired view
if (!getToken()) {
  document.getElementById('formView').style.display = 'none';
  document.getElementById('expiredView').style.display = 'block';
}

// Enter key submits
document.getElementById('confirmPassword')?.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleReset();
});

async function handleReset() {
  const newPw = document.getElementById('newPassword').value;
  const confirmPw = document.getElementById('confirmPassword').value;
  const errorEl = document.getElementById('errorMsg');
  const btn = document.getElementById('resetBtn');

  errorEl.textContent = '';

  if (!newPw || newPw.length < 8) {
    errorEl.textContent = 'Password must be at least 8 characters';
    return;
  }
  if (newPw !== confirmPw) {
    errorEl.textContent = 'Passwords do not match';
    return;
  }

  const token = getToken();
  if (!token) {
    errorEl.textContent = 'Missing reset token';
    return;
  }

  btn.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/api/auth/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, new_password: newPw }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (err.detail && err.detail.includes('expired')) {
        document.getElementById('formView').style.display = 'none';
        document.getElementById('expiredView').style.display = 'block';
        return;
      }
      throw new Error(err.detail || 'Reset failed');
    }

    // Success
    document.getElementById('formView').style.display = 'none';
    document.getElementById('successView').style.display = 'block';
  } catch (err) {
    errorEl.textContent = err.message;
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
