function PulseScoreBadge({ score, status, showInfo }) {
  const colors = {
    high: { bg: "#DCFCE7", text: "#166534", border: "#86EFAC" },
    medium: { bg: "#FEF9C3", text: "#854D0E", border: "#FDE047" },
    low: { bg: "#FEE2E2", text: "#991B1B", border: "#FCA5A5" },
    edge: { bg: "#F3E8FF", text: "#6B21A8", border: "#C4B5FD" },
  };
  const c = colors[status] || colors.medium;
  const [showTooltip, setShowTooltip] = useState(false);
  const labels = { high: "Strong consensus across sources", medium: "Moderate agreement", low: "Limited agreement", edge: "Unique angle, fewer sources agree" };
  return (
    <div style={{ position: "relative", display: "inline-flex" }}>
      <div
        onMouseEnter={() => setShowTooltip(true)}
        onMouseLeave={() => setShowTooltip(false)}
        style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "3px 10px", borderRadius: 20, backgroundColor: c.bg, border: `1px solid ${c.border}`, cursor: "help" }}
      >
        <div style={{ width: 8, height: 8, borderRadius: "50%", backgroundColor: c.text }} />
        <span style={{ fontSize: 12, fontWeight: 600, color: c.text }}>PULSE {score}%</span>
        <Info size={10} color={c.text} />
      </div>
      {showTooltip && (
        <div style={{ position: "absolute", bottom: "calc(100% + 8px)", left: "50%", transform: "translateX(-50%)", backgroundColor: "#1A1A2E", color: "white", padding: "10px 14px", borderRadius: 8, fontSize: 11, lineHeight: 1.5, width: 260, zIndex: 200, boxShadow: "0 4px 16px rgba(0,0,0,0.2)" }}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>PULSE Cross-Reference Score</div>
          <div style={{ marginBottom: 6 }}>{labels[status]}</div>
          <div style={{ fontSize: 10, opacity: 0.8 }}>Measures keyword overlap between this source and {score >= 80 ? "3+" : "2+"} other databases using Jaccard similarity. Higher = more sources agree on these findings.</div>
          <div style={{ position: "absolute", bottom: -4, left: "50%", transform: "translateX(-50%) rotate(45deg)", width: 8, height: 8, backgroundColor: "#1A1A2E" }} />
        </div>
      )}
    </div>
  );
}

    setTimeout(() => onClose(), 1500);

    <div style={{ position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", backgroundColor: "rgba(0,0,0,0.4)", backdropFilter: "blur(4px)" }}>

function ThinkingStep({ text, done, active }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "4px 0", opacity: done ? 0.6 : 1 }}>
      {done ? (
        <Check size={14} color={SUCCESS} />
      ) : active ? (
        <div style={{ width: 14, height: 14, border: `2px solid ${ACCENT}`, borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
      ) : (
        <div style={{ width: 14, height: 14, borderRadius: "50%", border: "2px solid #DDD" }} />
      )}
      <span style={{ fontSize: 13, color: done ? "#999" : active ? ACCENT : "#999" }}>{text}</span>
    </div>
  );
}

function ThinkingIndicator() {
  const [step, setStep] = useState(0);
  useEffect(() => {
    const timers = [
      setTimeout(() => setStep(1), 800),
      setTimeout(() => setStep(2), 2000),
      setTimeout(() => setStep(3), 3500),
      setTimeout(() => setStep(4), 5000),
    ];
    return () => timers.forEach(clearTimeout);
  }, []);

  const steps = [
    "Understanding your query...",
    "Searching 40M+ papers across 8 databases...",
    "Cross-referencing sources with PULSE...",
    "Synthesizing results...",
    "Preparing your response...",
  ];

  return (
    <div style={{ padding: "16px 20px", maxWidth: 500 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
        <div style={{ width: 32, height: 32, borderRadius: "50%", background: `linear-gradient(135deg, ${ACCENT}, ${ACCENT_DARK})`, display: "flex", alignItems: "center", justifyContent: "center", animation: "pulse 2s ease-in-out infinite" }}>
          <Sparkles size={16} color="white" />
        </div>
        <span style={{ fontSize: 14, fontWeight: 600, color: ACCENT }}>LENA is thinking...</span>
      </div>
      {steps.map((s, i) => (
        <ThinkingStep key={i} text={s} done={i < step} active={i === step} />
      ))}
    </div>
  );
}

function RegistrationModal({ onSubmit, onClose }) {
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [consent, setConsent] = useState(false);
  const [error, setError] = useState("");

  const handleSubmit = () => {
    if (!name.trim() || name.trim().length < 2) return setError("Please enter your first name");
    if (!email.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return setError("Please enter a valid email address");
    if (!consent) return setError("Please accept the data usage terms to continue");
    setError("");
    onSubmit({ name, email });
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", backgroundColor: "rgba(0,0,0,0.4)", backdropFilter: "blur(4px)" }}>

            <Sparkles size={18} color="white" />
          </div>

            </span>
          </label>
        </div>

        {error && <p style={{ fontSize: 12, color: DANGER, margin: "0 0 12px" }}>{error}</p>}

        <button onClick={handleSubmit} style={{ width: "100%", padding: "12px 0", backgroundColor: ACCENT, color: "white", border: "none", borderRadius: 10, fontSize: 15, fontWeight: 600, cursor: "pointer" }}>
          Continue Researching
        </button>
        <p style={{ fontSize: 11, color: "#AAA", textAlign: "center", margin: "12px 0 0" }}>
          We comply with GDPR and CCPA. <a href="#" style={{ color: ACCENT }}>Privacy Policy</a>
        </p>
      </div>
    </div>
  );
}

// --- Main App ---
function LENAPrototype() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [showThinking, setShowThinking] = useState(false);
  const [showModal, setShowModal] = useState(false);
  const [isRegistered, setIsRegistered] = useState(false);
  const [queryCount, setQueryCount] = useState(0);
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [rightPanelOpen, setRightPanelOpen] = useState(true);
  const [selectedPersona, setSelectedPersona] = useState("general");
  const [personaDropdown, setPersonaDropdown] = useState(false);
  const [expandedCards, setExpandedCards] = useState({});
  const [activeView, setActiveView] = useState("chat");
  const [altMedicineEnabled, setAltMedicineEnabled] = useState(false);
  const [shareModal, setShareModal] = useState(null); // null or { title: "..." }
  const inputRef = useRef(null);
  const chatEndRef = useRef(null);

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, showThinking]);

  const currentPrompts = SUGGESTED_PROMPTS[selectedPersona] || SUGGESTED_PROMPTS.general;
  const currentPersona = PERSONAS.find(p => p.id === selectedPersona);

  const handleSend = (text) => {
    const query = text || input.trim();
    if (!query) return;

    const newCount = queryCount + 1;
    setQueryCount(newCount);

    // Add user message
    setMessages(prev => [...prev, { role: "user", content: query }]);
    setInput("");

    // After first response, check registration
    if (newCount > 1 && !isRegistered) {
      setShowModal(true);
      return;
    }

    // Show thinking, then mock response
    const allResults = altMedicineEnabled ? [...MOCK_RESULTS, ...MOCK_ALT_RESULTS] : MOCK_RESULTS;
    const altNote = altMedicineEnabled ? "\n\nNatural & herbal alternatives are included below, marked with a green leaf indicator. These results are cross-referenced with the same PULSE validation as conventional findings." : "";
    setShowThinking(true);
    setTimeout(() => {
      setShowThinking(false);
      setMessages(prev => [...prev, {
        role: "assistant",
        content: `Based on analysis across 5 medical databases, here's what the current evidence shows about GLP-1 receptor agonists and cardiovascular outcomes. The PULSE cross-reference engine found strong consensus (81% average) across PubMed, Cochrane, and ClinicalTrials.gov, with supporting data from WHO and CDC.${altNote}`,
        results: allResults,
        pulseOverall: 81,
        followUps: altMedicineEnabled ? [
          "What natural supplements help lower blood pressure?",
          "Compare magnesium types for cardiovascular health",
          "Evidence for nattokinase vs prescription blood thinners",
        ] : [
          "What are the side effect profiles of different GLP-1 agonists?",
          "How do GLP-1 agonists compare to SGLT2 inhibitors for cardiovascular protection?",
          "What are the cost-effectiveness data for GLP-1 therapy?",
        ],
      }]);
    }, 6000);
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  };

  const handleRegistration = (data) => {
    setIsRegistered(true);
    setShowModal(false);
    // Process the pending query
    setShowThinking(true);
    setTimeout(() => {
      setShowThinking(false);
      setMessages(prev => [...prev, {
        role: "assistant",
        content: `Welcome, ${data.name}! Here are your results. Based on analysis across 5 medical databases, the PULSE engine found strong cross-reference consensus on this topic.`,
        results: MOCK_RESULTS.slice(0, 3),
        pulseOverall: 85,
        followUps: [
          "Show me the most recent clinical trials",
          "What do the Cochrane reviews say?",
          "Are there any conflicting findings?",
        ],
      }]);
    }, 5000);
  };

  const toggleCard = (id) => {
    setExpandedCards(prev => ({ ...prev, [id]: !prev[id] }));
  };

  // ---- Render ----
  return (
    <div style={{ display: "flex", height: "100vh", fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", backgroundColor: "#FAFBFC" }}>
      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        textarea:focus, input:focus { border-color: ${ACCENT} !important; box-shadow: 0 0 0 2px ${ACCENT}22 !important; }
        button:hover { opacity: 0.9; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #DDD; border-radius: 3px; }
      `}</style>

      {/* Registration Modal */}
      {showModal && <RegistrationModal onSubmit={handleRegistration} onClose={() => setShowModal(false)} />}

      {/* Share Modal */}
      {shareModal && <ShareModal resultTitle={shareModal.title} onClose={() => setShareModal(null)} onShare={(data) => console.log("Share tracked:", data)} />}

      {/* ===== LEFT SIDEBAR ===== */}
      {sidebarOpen && (
        <div style={{ width: 280, borderRight: "1px solid #E8E8E8", backgroundColor: "white", display: "flex", flexDirection: "column", flexShrink: 0 }}>
          {/* Logo */}
          <div style={{ padding: "20px 20px 16px", borderBottom: "1px solid #F0F0F0" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: `linear-gradient(135deg, ${ACCENT}, ${ACCENT_DARK})`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Sparkles size={18} color="white" />
                </div>
                <div>
                  <div style={{ fontSize: 18, fontWeight: 700, color: "#1A1A2E", letterSpacing: -0.5 }}>LENA</div>
                  <div style={{ fontSize: 9, color: "#999", textTransform: "uppercase", letterSpacing: 1 }}>Research Agent</div>
                </div>
              </div>
              <button onClick={() => setSidebarOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", padding: 4 }}>
                <X size={16} color="#999" />
              </button>
            </div>
          </div>

          {/* New Search */}
          <div style={{ padding: "12px 16px" }}>
            <button onClick={() => { setMessages([]); setShowThinking(false); setActiveView("chat"); }} style={{ width: "100%", padding: "10px 0", backgroundColor: ACCENT, color: "white", border: "none", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
              <Search size={14} /> New Search

          </div>

          {/* Search History */}
          <div style={{ padding: "16px 16px 8px", flex: 1, overflowY: "auto" }}>

              {/* Trending Searches */}
              <div style={{ textAlign: "left" }}>
                <h4 style={{ fontSize: 11, fontWeight: 600, color: "#999", textTransform: "uppercase", letterSpacing: 0.5, margin: "0 0 10px", display: "flex", alignItems: "center", gap: 4 }}>
                  <TrendingUp size={12} /> Trending This Week
                </h4>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {TRENDING.map((t, i) => (
                    <button key={i} onClick={() => handleSend(t.topic)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 14px", border: "1px solid #E8E8E8", borderRadius: 20, backgroundColor: "white", cursor: "pointer", fontSize: 12, color: "#555" }}>
                      <TrendingUp size={12} color={t.trend === "up" ? SUCCESS : "#999"} />
                      {t.topic}
                      <span style={{ fontSize: 10, color: "#BBB" }}>{t.count}</span>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* My Research - Chat History */}
          {activeView === "research" && (
            <div style={{ maxWidth: 640, margin: "0 auto", padding: "30px 20px" }}>
              <h2 style={{ fontSize: 20, fontWeight: 700, color: "#1A1A2E", margin: "0 0 4px" }}>My Research</h2>
              <p style={{ fontSize: 13, color: "#888", margin: "0 0 24px" }}>Your conversation history and saved research sessions</p>
              {MOCK_CHAT_HISTORY.map(chat => {
                const persona = PERSONAS.find(p => p.id === chat.persona);
                return (
                  <div key={chat.id} onClick={() => setActiveView("chat")} style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 16px", border: "1px solid #E8E8E8", borderRadius: 10, marginBottom: 8, cursor: "pointer", backgroundColor: "white", transition: "all 0.15s" }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = ACCENT}
                    onMouseLeave={e => e.currentTarget.style.borderColor = "#E8E8E8"}
                  >
                    <div style={{ width: 36, height: 36, borderRadius: 10, backgroundColor: ACCENT_LIGHT, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>
                      {persona?.icon || "🌐"}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <p style={{ fontSize: 14, fontWeight: 500, color: "#1A1A2E", margin: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{chat.title}</p>
                      <div style={{ display: "flex", gap: 12, marginTop: 4 }}>
                        <span style={{ fontSize: 11, color: "#999" }}>{chat.date}</span>
                        <span style={{ fontSize: 11, color: "#999" }}>{chat.messages} messages</span>
                        <span style={{ fontSize: 11, color: ACCENT }}>{persona?.label}</span>
                      </div>
                    </div>
                    <ChevronRight size={16} color="#CCC" />
                  </div>
                );
              })}
            </div>
          )}

          {/* Community Coming Soon */}
          {activeView === "community" && (
            <div style={{ maxWidth: 500, margin: "80px auto", padding: "0 20px", textAlign: "center" }}>
              <div style={{ width: 64, height: 64, borderRadius: "50%", backgroundColor: "#FEF3C7", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px", fontSize: 28 }}>👥</div>
              <h2 style={{ fontSize: 22, fontWeight: 700, color: "#1A1A2E", margin: "0 0 8px" }}>Professional Community</h2>
              <p style={{ fontSize: 14, color: "#888", margin: "0 0 4px" }}>Connect with fellow researchers. Discuss findings. Share insights.</p>
              <div style={{ display: "inline-block", padding: "4px 12px", backgroundColor: "#FEF3C7", color: "#92400E", borderRadius: 6, fontSize: 12, fontWeight: 600, margin: "12px 0 24px" }}>Coming in LENA V2</div>
              <div style={{ padding: 20, backgroundColor: "#F8FAFC", borderRadius: 12, textAlign: "left" }}>
                <p style={{ fontSize: 13, color: "#666", margin: "0 0 12px" }}>Be the first to know when Community launches:</p>
                <div style={{ display: "flex", gap: 8 }}>
                  <input placeholder="Your email address" style={{ flex: 1, padding: "10px 14px", border: "1px solid #DDD", borderRadius: 8, fontSize: 13, outline: "none" }} />
                  <button style={{ padding: "10px 20px", backgroundColor: ACCENT, color: "white", border: "none", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>Notify Me</button>
                </div>
              </div>
            </div>
          )}

          {/* Contribution Coming Soon */}
          {activeView === "contribution" && (
            <div style={{ maxWidth: 560, margin: "60px auto", padding: "0 20px", textAlign: "center" }}>
              <div style={{ width: 64, height: 64, borderRadius: "50%", backgroundColor: "#EDE9FE", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px", fontSize: 28 }}>📄</div>
              <h2 style={{ fontSize: 22, fontWeight: 700, color: "#1A1A2E", margin: "0 0 8px" }}>Research Contribution</h2>
              <p style={{ fontSize: 14, color: "#888", margin: "0 0 4px", lineHeight: 1.6 }}>A repository for professionals to submit research papers, clinical findings, and pre-publication work for review and validation.</p>
              <div style={{ display: "inline-block", padding: "4px 12px", backgroundColor: "#FEF3C7", color: "#92400E", borderRadius: 6, fontSize: 12, fontWeight: 600, margin: "12px 0 24px" }}>Coming in LENA V2</div>

              <div style={{ textAlign: "left", marginBottom: 20 }}>
                {[
                  { icon: "📝", title: "Submit Papers", desc: "Upload research papers and clinical findings for pre-publication review" },
                  { icon: "🔍", title: "Expert Validation", desc: "Credentialed reviewers screen and validate submissions" },
                  { icon: "📊", title: "Propose to Sources", desc: "Validated papers are proposed to PubMed, Cochrane, and other indexed sources" },
                  { icon: "🏋️", title: "Fitness & Wellness", desc: "Not just medicine. Submit research on exercise, nutrition, and preventive health" },
                ].map((item, i) => (
                  <div key={i} style={{ display: "flex", gap: 12, padding: "14px 16px", backgroundColor: i % 2 === 0 ? "#F8FAFC" : "white", borderRadius: 8, marginBottom: 4 }}>
                    <span style={{ fontSize: 20 }}>{item.icon}</span>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: "#1A1A2E" }}>{item.title}</div>
                      <div style={{ fontSize: 12, color: "#888", marginTop: 2 }}>{item.desc}</div>
                    </div>
                  </div>
                ))}
              </div>

              <div style={{ padding: 20, backgroundColor: "#F8FAFC", borderRadius: 12, textAlign: "left" }}>
                <p style={{ fontSize: 13, color: "#666", margin: "0 0 12px" }}>Interested in contributing research? Get early access:</p>
                <div style={{ display: "flex", gap: 8 }}>
                  <input placeholder="Your email address" style={{ flex: 1, padding: "10px 14px", border: "1px solid #DDD", borderRadius: 8, fontSize: 13, outline: "none" }} />
                  <button style={{ padding: "10px 20px", backgroundColor: "#7C3AED", color: "white", border: "none", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>Join Waitlist</button>
                </div>
              </div>
            </div>
          )}

          {/* How It Works / FAQ */}
          {activeView === "faq" && (
            <div style={{ maxWidth: 680, margin: "0 auto", padding: "30px 20px" }}>
              <h2 style={{ fontSize: 22, fontWeight: 700, color: "#1A1A2E", margin: "0 0 4px" }}>How LENA Works</h2>
              <p style={{ fontSize: 13, color: "#888", margin: "0 0 28px" }}>Understanding LENA's research methodology, scoring, and how we validate evidence</p>

              {[
                {
                  q: "What is the PULSE Cross-Reference Score?",
                  a: "PULSE (Published Literature Source Evaluation) measures how much independent medical databases agree on a particular finding. When you search LENA, we query multiple databases simultaneously. PULSE extracts key terms from every result, builds a profile of what each source is saying, identifies terms that appear across 3 or more sources (consensus keywords), then calculates a similarity score for each result against that consensus. A score of 92% means that result's content strongly aligns with what the majority of sources are reporting. A score of 58% means it covers a unique angle that fewer sources discuss, which makes it an 'edge case' worth noting rather than wrong.",
                  icon: Shield,
                },
                {
                  q: "What do the confidence levels mean?",
                  a: "High (80%+): Strong consensus across multiple databases. The finding is well-supported by independent sources. Medium (60-79%): Moderate agreement. Most sources align but some variation exists. Edge Case (40-59%): This result covers an angle that other sources aren't focused on. It may be newer research, a different perspective, or a niche topic. Still valuable, just less cross-validated. Low (below 40%): Limited agreement. Treat with extra scrutiny and verify independently.",
                  icon: BarChart3,
                },
                {
                  q: "Where does LENA get its data?",
                  a: "LENA simultaneously searches across 40+ million papers, clinical trials, systematic reviews, and health datasets from multiple established medical and scientific databases worldwide. Every result is cross-referenced using our PULSE engine, so you get validated findings in seconds instead of spending hours manually comparing sources. When the Natural & Herbal toggle is enabled, LENA expands to include peer-reviewed research on dietary supplements, natural compounds, and complementary therapies from dedicated scientific databases.",
                  icon: BookOpen,
                },
                {
                  q: "How does the Natural & Herbal toggle work?",
                  a: "When enabled, LENA expands its search to include evidence-based research on natural remedies, herbal medicines, dietary supplements, and complementary therapies. These results are sourced from the same caliber of peer-reviewed databases and are cross-referenced using the same PULSE validation as conventional findings. Alternative results are marked with a green leaf badge so you can distinguish them at a glance. LENA presents all evidence with equal rigor regardless of whether it's conventional or alternative.",
                  icon: Leaf,
                },
                {
                  q: "How does persona detection work?",
                  a: "LENA detects the type of user you are (medical student, clinician, pharmacist, researcher, lecturer, physiotherapist, patient, or general) based on the language and terminology in your queries. A clinician asking about 'GLP-1 agonist cardiovascular outcomes' gets a different response framing than a patient asking 'what should I know about my diabetes medication.' You can also manually select your persona using the dropdown in the top bar. Your detected persona also influences suggested prompts and follow-up questions.",
                  icon: User,
                },
                {
                  q: "What happens when I share results?",
                  a: "The share feature lets you send LENA research to colleagues, students, patients, or anyone who would benefit. You select who you're sharing with (their role), optionally add their email and a note. Shared research arrives as a clean, formatted summary with all citations and PULSE scores intact. This helps LENA understand how research flows between different professional roles, which improves our recommendations over time.",
                  icon: Share2,
                },
                {
                  q: "Is my data private?",
                  a: "Your search queries and results are stored securely and never shared with third parties, sold, or published publicly. We use your anonymized search patterns to improve LENA's recommendations and identify trending research topics. You can request deletion of all your data at any time. LENA complies with GDPR and CCPA data protection regulations.",
                  icon: Shield,
                },
                {
                  q: "Does LENA provide medical advice?",
                  a: "No. LENA is a research tool that surfaces and cross-references published medical evidence. It does not diagnose conditions, recommend treatments, or replace professional medical consultation. When LENA detects that a query crosses into personal medical advice territory, it will gently redirect you toward consulting a healthcare professional while still providing the research evidence you're looking for.",
                  icon: Heart,
                },
                {
                  q: "What about fitness and wellness research?",
                  a: "LENA's scope extends beyond pharmaceuticals and clinical medicine. We index research on exercise science, nutrition, preventive health, sports medicine, rehabilitation, and wellness interventions. Whether you're researching the evidence behind a specific workout protocol or looking for nutritional approaches to managing a condition, LENA treats fitness and wellness research with the same cross-reference rigor as clinical studies.",
                  icon: Dumbbell,
                },
              ].map((item, i) => {
                const Icon = item.icon;
                return (
                  <div key={i} style={{ marginBottom: 12, border: "1px solid #E8E8E8", borderRadius: 10, overflow: "hidden", backgroundColor: "white" }}>
                    <details style={{ cursor: "pointer" }}>
                      <summary style={{ display: "flex", alignItems: "center", gap: 10, padding: "14px 16px", fontSize: 14, fontWeight: 600, color: "#1A1A2E", listStyle: "none" }}>
                        <Icon size={16} color={ACCENT} style={{ flexShrink: 0 }} />
                        <span style={{ flex: 1 }}>{item.q}</span>
                        <ChevronRight size={14} color="#CCC" />
                      </summary>
                      <div style={{ padding: "0 16px 14px 42px", fontSize: 13, color: "#555", lineHeight: 1.65 }}>
                        {item.a}
                      </div>
                    </details>
                  </div>
                );
              })}

              <div style={{ marginTop: 24, padding: 16, backgroundColor: ACCENT_LIGHT, borderRadius: 10, border: `1px solid ${ACCENT}33` }}>
                <h4 style={{ fontSize: 13, fontWeight: 600, color: ACCENT, margin: "0 0 6px" }}>LENA by the Numbers</h4>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 12 }}>
                  {[
                    { num: "40M+", label: "Searchable papers" },
                    { num: "8+", label: "Scientific databases" },
                    { num: "< 30s", label: "Average search time" },
                    { num: "100%", label: "Peer-reviewed sources" },
                  ].map(s => (
                    <div key={s.label} style={{ textAlign: "center", padding: "10px 16px", backgroundColor: "white", borderRadius: 8, border: "1px solid #E0E0E0", minWidth: 100 }}>
                      <div style={{ fontSize: 18, fontWeight: 700, color: ACCENT }}>{s.num}</div>
                      <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>{s.label}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Messages */}
          {activeView === "chat" && (
            <div style={{ maxWidth: 760, margin: "0 auto", padding: "0 20px" }}>
              {messages.map((msg, i) => (
                <div key={i} style={{ marginBottom: 24, animation: "fadeIn 0.3s ease-out" }}>
                  {msg.role === "user" ? (
                    <div style={{ display: "flex", justifyContent: "flex-end" }}>
                      <div style={{ maxWidth: "75%", padding: "12px 18px", backgroundColor: ACCENT, color: "white", borderRadius: "18px 18px 4px 18px", fontSize: 14, lineHeight: 1.5, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>
                        {msg.content}
                      </div>
                    </div>
                  ) : (
                    <div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                        <div style={{ width: 28, height: 28, borderRadius: "50%", background: `linear-gradient(135deg, ${ACCENT}, ${ACCENT_DARK})`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                          <Sparkles size={14} color="white" />
                        </div>
                        <span style={{ fontSize: 13, fontWeight: 600, color: "#1A1A2E" }}>LENA</span>
                        {msg.pulseOverall && <PulseScoreBadge score={msg.pulseOverall} status={msg.pulseOverall >= 80 ? "high" : msg.pulseOverall >= 60 ? "medium" : "low"} />}
                        <button onClick={() => setShareModal({ title: "Full research response" })} style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#888", background: "none", border: "1px solid #E0E0E0", borderRadius: 6, padding: "4px 10px", cursor: "pointer" }}><Share2 size={12} /> Share All</button>
                      </div>

                      {/* Summary */}
                      <p style={{ fontSize: 14, color: "#333", lineHeight: 1.65, margin: "0 0 16px 36px" }}>{msg.content}</p>

                      {/* Source Cards */}
                      {msg.results && (
                        <div style={{ marginLeft: 36 }}>
                          <h4 style={{ fontSize: 11, fontWeight: 600, color: "#999", textTransform: "uppercase", letterSpacing: 0.5, margin: "0 0 8px" }}>Sources ({msg.results.length})</h4>
                          {msg.results.map(r => (
                            <SourceCard key={r.id} result={r} expanded={expandedCards[r.id]} onToggle={() => toggleCard(r.id)} onShare={(title) => setShareModal({ title })} />
                          ))}
                        </div>
                      )}

                      {/* Follow-up Prompts */}
                      {msg.followUps && (
                        <div style={{ marginLeft: 36, marginTop: 16 }}>
                          <h4 style={{ fontSize: 11, fontWeight: 600, color: "#999", textTransform: "uppercase", letterSpacing: 0.5, margin: "0 0 8px", display: "flex", alignItems: "center", gap: 4 }}>
                            <Sparkles size={10} /> Dig Deeper
                          </h4>
                          {msg.followUps.map((fu, j) => (
                            <button key={j} onClick={() => handleSend(fu)} style={{ display: "block", width: "100%", textAlign: "left", padding: "8px 14px", border: "1px solid #E8E8E8", borderRadius: 8, backgroundColor: "white", cursor: "pointer", marginBottom: 4, fontSize: 12, color: ACCENT }}>
                              {fu}
                            </button>
                          ))}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))}

              {/* Thinking Indicator */}
              {showThinking && <ThinkingIndicator />}
              <div ref={chatEndRef} />
            </div>
          )}
        </div>

        {/* ===== INPUT BAR ===== */}
        {activeView === "chat" && (
          <div style={{ padding: "12px 20px 16px", borderTop: "1px solid #E8E8E8", backgroundColor: "white" }}>
            <div style={{ maxWidth: 760, margin: "0 auto" }}>
              <div style={{ display: "flex", alignItems: "flex-end", gap: 10, border: "1px solid #DDD", borderRadius: 14, padding: "10px 14px", backgroundColor: "#FAFAFA", transition: "all 0.2s" }}>
                <textarea
                  ref={inputRef}
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={handleKeyDown}
                  placeholder="Ask LENA a research question..."
                  rows={1}
                  style={{
                    flex: 1,
                    border: "none",
                    outline: "none",
                    resize: "none",
                    fontSize: 14,
                    lineHeight: 1.5,
                    backgroundColor: "transparent",
                    fontFamily: "inherit",
                    maxHeight: 130,
                    overflowY: "auto",
                  }}
                  onInput={e => {
                    e.target.style.height = "auto";
                    e.target.style.height = Math.min(e.target.scrollHeight, 130) + "px";
                  }}
                />
                <button
                  onClick={() => handleSend()}
                  disabled={!input.trim()}
                  style={{
                    width: 36,
                    height: 36,
                    borderRadius: 10,
                    border: "none",
                    backgroundColor: input.trim() ? ACCENT : "#E0E0E0",
                    cursor: input.trim() ? "pointer" : "default",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    flexShrink: 0,
                    transition: "background-color 0.2s",
                  }}
                >
                  <Send size={16} color="white" />
                </button>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                <span style={{ fontSize: 10, color: "#BBB" }}>Shift + Enter for new line</span>
                <span style={{ fontSize: 10, color: "#BBB" }}>LENA searches 40M+ papers across 8+ scientific databases</span>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ===== RIGHT PANEL - Research Insights ===== */}
      {rightPanelOpen && activeView === "chat" && messages.some(m => m.role === "assistant") && (
        <div style={{ width: 300, borderLeft: "1px solid #E8E8E8", backgroundColor: "white", flexShrink: 0, overflowY: "auto" }}>
          <div style={{ padding: "12px 16px", borderBottom: "1px solid #F0F0F0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: "#1A1A2E" }}>Research Insights</span>
            <button onClick={() => setRightPanelOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", padding: 2 }}>
              <X size={14} color="#999" />
            </button>
          </div>
          <ResearchPanel />
        </div>
      )}
    </div>
  );
}

        ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(LENAPrototype));
    </script>
</body>
</html>
