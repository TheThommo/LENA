    function PulseScoreBadge({ score, status, showInfo }) {
      const colors = {
        high: { bg: "#DCFCE7", text: "#166534", border: "#86EFAC" },
        medium: { bg: "#FEF9C3", text: "#854D0E", border: "#FDE047" },
        low: { bg: "#FEE2E2", text: "#991B1B", border: "#FCA5A5" },
        edge: { bg: "#F3E8FF", text: "#6B21A8", border: "#C4B5FD" },
      };
      const c = colors[status] || colors.medium;
      const [showTooltip, setShowTooltip] = useState(false);
      const labels = { high: "Strong consensus across sources", medium: "Moderate agreement", low: "Limited agreement", edge: "Unique angle, fewer sources agree" };
      return (
        <div style={{ position: "relative", display: "inline-flex" }}>
          <div
            onMouseEnter={() => setShowTooltip(true)}
            onMouseLeave={() => setShowTooltip(false)}
            style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "3px 10px", borderRadius: 20, backgroundColor: c.bg, border: `1px solid ${c.border}`, cursor: "help" }}
          >
            <div style={{ width: 8, height: 8, borderRadius: "50%", backgroundColor: c.text }} />
            <span style={{ fontSize: 12, fontWeight: 600, color: c.text }}>PULSE {score}%</span>
            <Icon name="Info" size={10} color={c.text} />
          </div>
          {showTooltip && (
            <div style={{ position: "absolute", bottom: "calc(100% + 8px)", left: "50%", transform: "translateX(-50%)", backgroundColor: "#1A1A2E", color: "white", padding: "10px 14px", borderRadius: 8, fontSize: 11, lineHeight: 1.5, width: 260, zIndex: 200, boxShadow: "0 4px 16px rgba(0,0,0,0.2)" }}>
              <div style={{ fontWeight: 700, marginBottom: 4 }}>PULSE Cross-Reference Score</div>
              <div style={{ marginBottom: 6 }}>{labels[status]}</div>
              <div style={{ fontSize: 10, opacity: 0.8 }}>Measures keyword overlap between this source and {score >= 80 ? "3+" : "2+"} other databases using Jaccard similarity. Higher = more sources agree on these findings.</div>
              <div style={{ position: "absolute", bottom: -4, left: "50%", transform: "translateX(-50%) rotate(45deg)", width: 8, height: 8, backgroundColor: "#1A1A2E" }} />
            </div>
          )}
        </div>
      );
    }

    function ShareModal({ onClose, onShare, resultTitle }) {

      const [email, setEmail] = useState("");
      const [note, setNote] = useState("");
      const [shared, setShared] = useState(false);

    function LENAPrototype() {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState("");
      const [showThinking, setShowThinking] = useState(false);
      const [showModal, setShowModal] = useState(false);
      const [isRegistered, setIsRegistered] = useState(false);
      const [queryCount, setQueryCount] = useState(0);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [rightPanelOpen, setRightPanelOpen] = useState(true);
      const [selectedPersona, setSelectedPersona] = useState("general");
      const [personaDropdown, setPersonaDropdown] = useState(false);
      const [expandedCards, setExpandedCards] = useState({});
      const [activeView, setActiveView] = useState("chat");
      const [altMedicineEnabled, setAltMedicineEnabled] = useState(false);
      const [shareModal, setShareModal] = useState(null);
      const inputRef = useRef(null);
      const chatEndRef = useRef(null);

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, showThinking]);

      const currentPrompts = SUGGESTED_PROMPTS[selectedPersona] || SUGGESTED_PROMPTS.general;
      const currentPersona = PERSONAS.find(p => p.id === selectedPersona);

      const handleSend = (text) => {
        const query = text || input.trim();
        if (!query) return;

        const newCount = queryCount + 1;
        setQueryCount(newCount);

        setMessages(prev => [...prev, { role: "user", content: query }]);
        setInput("");

        if (newCount > 1 && !isRegistered) {
          setShowModal(true);
          return;
        }

        const allResults = altMedicineEnabled ? [...MOCK_RESULTS, ...MOCK_ALT_RESULTS] : MOCK_RESULTS;
        const altNote = altMedicineEnabled ? "\n\nNatural & herbal alternatives are included below, marked with a green leaf indicator. These results are cross-referenced with the same PULSE validation as conventional findings." : "";
        setShowThinking(true);
        setTimeout(() => {
          setShowThinking(false);
          setMessages(prev => [...prev, {
            role: "assistant",
            content: `Based on analysis across 5 medical databases, here's what the current evidence shows about GLP-1 receptor agonists and cardiovascular outcomes. The PULSE cross-reference engine found strong consensus (81% average) across PubMed, Cochrane, and ClinicalTrials.gov, with supporting data from WHO and CDC.${altNote}`,
            results: allResults,
            pulseOverall: 81,
            followUps: altMedicineEnabled ? [
              "What natural supplements help lower blood pressure?",
              "Compare magnesium types for cardiovascular health",
              "Evidence for nattokinase vs prescription blood thinners",
            ] : [
              "What are the side effect profiles of different GLP-1 agonists?",
              "How do GLP-1 agonists compare to SGLT2 inhibitors for cardiovascular protection?",
              "What are the cost-effectiveness data for GLP-1 therapy?",
            ],
          }]);
        }, 6000);
      };

      const handleKeyDown = (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      };

      const handleRegistration = (data) => {
        setIsRegistered(true);
        setShowModal(false);
        setShowThinking(true);
        setTimeout(() => {
          setShowThinking(false);
          setMessages(prev => [...prev, {
            role: "assistant",
            content: `Welcome, ${data.name}! Here are your results. Based on analysis across 5 medical databases, the PULSE engine found strong cross-reference consensus on this topic.`,
            results: MOCK_RESULTS.slice(0, 3),
            pulseOverall: 85,
            followUps: [
              "Show me the most recent clinical trials",
              "What do the Cochrane reviews say?",
              "Are there any conflicting findings?",
            ],
          }]);
        }, 5000);
      };

      const toggleCard = (id) => {
        setExpandedCards(prev => ({ ...prev, [id]: !prev[id] }));
      };

      return (
        <div style={{ display: "flex", height: "100vh", fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", backgroundColor: "#FAFBFC" }}>
          <style>{`

                    />
                    <button
                      onClick={() => handleSend()}
                      disabled={!input.trim()}
                      style={{
                        width: 36,
                        height: 36,
                        borderRadius: 10,
                        border: "none",
                        backgroundColor: input.trim() ? ACCENT : "#E0E0E0",
                        cursor: input.trim() ? "pointer" : "default",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        flexShrink: 0,
                        transition: "background-color 0.2s",
                      }}
                    >
                      <Icon name="Send" size={16} color="white" />
                    </button>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                    <span style={{ fontSize: 10, color: "#BBB" }}>Shift + Enter for new line</span>
                    <span style={{ fontSize: 10, color: "#BBB" }}>LENA searches 40M+ papers across 8+ scientific databases</span>
                  </div>
                </div>
              </div>
            )}
          </div>

          {rightPanelOpen && activeView === "chat" && messages.some(m => m.role === "assistant") && (
            <div style={{ width: 300, borderLeft: "1px solid #E8E8E8", backgroundColor: "white", flexShrink: 0, overflowY: "auto" }}>
              <div style={{ padding: "12px 16px", borderBottom: "1px solid #F0F0F0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: "#1A1A2E" }}>Research Insights</span>
                <button onClick={() => setRightPanelOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", padding: 2 }}>
                  <Icon name="X" size={14} color="#999" />
                </button>
              </div>
              <ResearchPanel />
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(LENAPrototype));
  </script>
</body>
</html>
